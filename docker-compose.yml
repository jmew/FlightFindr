version: '3.8'
services:
  web-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=3000
      - MCP_SERVER_URL=http://mcp-server:9999/mcp
    depends_on:
      mcp-server:
        condition: service_healthy

  mcp-server:
    build:
      context: ./flight-findr-mcp
      dockerfile: Dockerfile
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/mcp/tools"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
