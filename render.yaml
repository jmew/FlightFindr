services:
  # The Node.js Web Server, using Render's native Node runtime
  - type: web
    name: web-server
    env: node
    plan: free
    rootDir: ./web-server
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false # This prompts you to enter the secret in the Render dashboard
      - key: MCP_SERVER_URL
        fromService:
          type: pserv
          name: mcp-server
          property: hostport # Use Render's internal service discovery

  # The Python MCP Server, using Render's native Python runtime
  - type: pserv # Private Service, as it doesn't need to be public
    name: mcp-server
    env: python
    plan: free
    rootDir: ./flight-findr-mcp
    buildCommand: "pip install -r requirements.txt && playwright install --with-deps"
    startCommand: "python mcp_server.py --transport=http"