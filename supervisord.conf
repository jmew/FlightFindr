[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:web-server]
command=sh -c "sleep 5 && npm start"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:mcp-server]
command=python flight-findr-mcp/mcp_server.py --transport http --host 0.0.0.0
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
