steps:
# 1. Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/dazzling-lodge-470804-e6/flight-findr-repo/web-server:latest'
    - '.'
  dir: 'web-server'

# 2. Push the Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/dazzling-lodge-470804-e6/flight-findr-repo/web-server:latest'

# 3. Deploy the image to Cloud Run, setting environment variables
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'web-server'
    - '--image=us-central1-docker.pkg.dev/dazzling-lodge-470804-e6/flight-findr-repo/web-server:latest'
    - '--region=us-central1'
    - '--platform=managed'
    - '--allow-unauthenticated'
    - '--port=3000'
    - '--timeout=300s'
    - '--set-env-vars=MCP_URL=https://mcp-server-304334704110.us-central1.run.app/mcp,NODE_ENV=production'

images:
- 'us-central1-docker.pkg.dev/dazzling-lodge-470804-e6/flight-findr-repo/web-server:latest'

options:
  logging: CLOUD_LOGGING_ONLY
